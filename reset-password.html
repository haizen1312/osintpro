<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - OSINTPRO</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css?v=20260630-auth">
</head>
<body class="auth-page">
  <main class="auth-shell compact">
    <section class="auth-panel">
      <a class="auth-brand" href="/" aria-label="OSINTPRO home">
        <span>OP</span>
        <strong>OSINTPRO</strong>
      </a>
      <p class="pill">One-time reset</p>
      <h1>Set a new password.</h1>
      <p class="auth-copy">This link expires after one hour and can only be used once.</p>

      <form class="auth-form standalone" id="resetPageForm" novalidate>
        <div class="field">
          <label for="resetPassword">New password</label>
          <input id="resetPassword" name="password" type="password" autocomplete="new-password" required>
          <div class="strength-meter" aria-hidden="true"><span id="passwordStrengthBar"></span></div>
          <p class="field-hint" id="passwordStrengthText">Use at least 8 characters.</p>
          <p class="field-error" id="resetPasswordError"></p>
        </div>
        <div class="field">
          <label for="resetConfirmPassword">Confirm password</label>
          <input id="resetConfirmPassword" name="confirm_password" type="password" autocomplete="new-password" required>
          <p class="field-error" id="resetConfirmPasswordError"></p>
        </div>
        <button class="primary" type="submit">Update password</button>
      </form>

      <p class="auth-links"><a href="/login">Back to login</a></p>
      <div class="billing-message" id="authMessage"></div>
    </section>
  </main>
  <script src="/auth.js?v=20260630-auth"></script>
</body>
</html>
