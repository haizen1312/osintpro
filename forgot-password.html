<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - OSINTPRO</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css?v=20260630-auth">
</head>
<body class="auth-page">
  <main class="auth-shell compact">
    <section class="auth-panel">
      <a class="auth-brand" href="/" aria-label="OSINTPRO home">
        <span>OP</span>
        <strong>OSINTPRO</strong>
      </a>
      <p class="pill">Account recovery</p>
      <h1>Request a reset link.</h1>
      <p class="auth-copy">Enter a nickname or email. If the account can receive recovery email, a reset link will be sent.</p>

      <form class="auth-form standalone" id="forgotPageForm" novalidate>
        <div class="field">
          <label for="forgotIdentifier">Nickname or email</label>
          <input id="forgotIdentifier" name="identifier" type="text" autocomplete="username" spellcheck="false" required>
          <p class="field-error" id="forgotIdentifierError"></p>
        </div>
        <button class="primary" type="submit">Send reset link</button>
      </form>

      <p class="auth-links">
        <a href="/login">Back to login</a>
        <a href="/register">Create account</a>
      </p>
      <div class="billing-message" id="authMessage"></div>
    </section>
  </main>
  <script src="/auth.js?v=20260630-auth"></script>
</body>
</html>
