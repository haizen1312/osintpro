<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSINTPRO Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="admin-shell">
    <section class="admin-panel">
      <div class="brand">
        <div class="mark">OP</div>
        <div>
          <strong>OSINTPRO</strong>
          <span>Admin access</span>
        </div>
      </div>

      <div>
        <span class="pill">Private owner access</span>
        <h1>Accesso admin</h1>
        <p>Sblocca utilizzo completo dell'app senza checkout o limiti freemium.</p>
      </div>

      <form id="adminForm" class="admin-form">
        <div>
          <label for="adminCode">Codice admin</label>
          <input id="adminCode" name="adminCode" type="password" autocomplete="current-password" placeholder="Codice privato">
        </div>
        <button class="primary" type="submit">Sblocca Admin</button>
      </form>

      <div class="billing-message" id="adminMessage"></div>
      <section class="admin-dashboard" id="adminDashboard" hidden>
        <div class="admin-status-grid" id="adminStatusGrid"></div>

        <div class="admin-actions">
          <a class="secondary button-link" href="/api/admin/export">Scarica export operativo</a>
        </div>

        <form id="planForm" class="admin-form inline-admin-form">
          <div>
            <label for="planNickname">Nickname utente</label>
            <input id="planNickname" name="planNickname" autocomplete="off" placeholder="nickname">
          </div>
          <div>
            <label for="planValue">Piano</label>
            <select id="planValue" name="planValue">
              <option value="Free">Free</option>
              <option value="Pro">Pro</option>
              <option value="Agency">Agency</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <button class="secondary" type="submit">Aggiorna piano</button>
        </form>

        <div>
          <div class="section-head compact-head">
            <div>
              <span class="pill">Users</span>
              <h2>Account recenti</h2>
            </div>
          </div>
          <div class="admin-table" id="adminUsers"></div>
        </div>

        <div>
          <div class="section-head compact-head">
            <div>
              <span class="pill">Stripe</span>
              <h2>Ultimi eventi</h2>
            </div>
          </div>
          <div class="admin-table" id="adminEvents"></div>
        </div>
      </section>
      <a class="secondary button-link" href="/">Torna all'app</a>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
