services:
  - type: web
    name: osintpro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: osintpro-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: OSINTPRO_ADMIN_CODE
        sync: false
      - key: OSINTPRO_SECRET_KEY
        sync: false
      - key: OSINTPRO_STRIPE_PRO_URL
        sync: false
      - key: OSINTPRO_STRIPE_AGENCY_URL
        sync: false
      - key: OSINTPRO_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OSINTPRO_CRON_SECRET
        generateValue: true
      - key: OSINTPRO_MONITOR_BATCH_LIMIT
        value: "20"
      - key: OSINTPRO_REGISTRATION_IP_LIMIT
        value: "3"
      - key: OSINTPRO_REGISTRATION_IP_ALLOWLIST
        sync: false
      - key: OSINTPRO_DB_PATH
        value: /var/data/osintpro.sqlite3
      - key: OSINTPRO_BACKUP_DIR
        value: /var/data/backups
      - key: OSINTPRO_BACKUP_RETENTION
        value: "30"
      - key: OSINTPRO_ALERT_WEBHOOK_URL
        sync: false
