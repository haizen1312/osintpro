services:
  - type: web
    name: osintpro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OSINTPRO_ADMIN_CODE
        sync: false
      - key: OSINTPRO_SECRET_KEY
        sync: false
      - key: OSINTPRO_STRIPE_PRO_URL
        sync: false
      - key: OSINTPRO_STRIPE_AGENCY_URL
        sync: false
      - key: OSINTPRO_STRIPE_WEBHOOK_SECRET
        sync: false
